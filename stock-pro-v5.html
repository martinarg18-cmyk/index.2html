function saveGsUrl() {
  const url = (document.getElementById('sys_gs_url').value || '').trim();
  gsUrl = url;
  localStorage.setItem('pp2_gs_url', url);
  toast('URL guardada', 'ok');
  if (url) gsStartPull();
}

// Genera un hash simple del catálogo para detectar cambios
function catalogHash() {
  return catalog.map(p => `${p.id}:${p.stock}:${p.price}:${p.venc}`).join('|');
}

// ── PUSH: app → Sheets ──
async function gsPush() {
  if (!gsUrl) return;
  const rows = [];
  catalog.forEach(p => {
    const cat = CATS.find(c => c.id === p.cat);
    const prov = provs.find(x => x.id === p.prov);
    const locsStr = p.locs ? p.locs.map(l => `${l.name}: ${l.qty} ${p.unit}`).join(' · ') : '';
    rows.push({
      id:       p.id,
      nombre:   p.name,
      categoria: cat ? cat.name : p.cat,
      proveedor: prov ? prov.name : p.prov,
      precio:   p.price || 0,
      unidad:   p.unit,
      stock:    p.stock,
      minimo:   p.min,
      vencimiento: p.venc || '',
      ubicaciones: locsStr
    });
  });
  try {
    await fetch(gsUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'push', rows })
    });
    gsLastHash = catalogHash();
    gsSetStatus('✓ Sincronizado', 'var(--accent)');
    log('Sheets', 'Stock subido a Google Sheets');
  } catch(e) {
    gsSetStatus('Sin conexión', 'var(--red)');
  }
}

// ── PULL: Sheets → app ──
async function gsPull() {
  if (!gsUrl) return;
  try {
    const res = await fetch(gsUrl + '?action=pull', { cache: 'no-store' });
    const data = await res.json();
    if (!data.rows || !data.rows.length) return;

    let cambios = 0;
    data.rows.forEach(row => {
      const p = catalog.find(x => String(x.id) === String(row.id));
      if (!p) return;
      const newPrice = parseFloat(row.precio) || 0;
      const newStock = parseFloat(row.stock) || 0;
      const newVenc  = (row.vencimiento || '').trim();
      if (p.price !== newPrice || p.stock !== newStock || p.venc !== newVenc) {
        p.price = newPrice;
        p.stock = newStock;
        p.venc  = newVenc;
        // Redistribuir stock en la primera ubicación si hay diferencia
        if (p.locs && p.locs.length === 1) p.locs[0].qty = newStock;
        cambios++;
      }
    });

    if (cambios > 0) {
      persist();
      if (currentPage === 'stock') renderStock();
      toast(`📥 ${cambios} producto${cambios > 1 ? 's' : ''} actualizado${cambios > 1 ? 's' : ''} por tu jefe`, 'ok');
      log('Sheets', `Pull: ${cambios} cambio(s) recibido(s)`);
      gsLastHash = catalogHash();
    }
    gsSetStatus('✓ Activo', 'var(--accent)');
  } catch(e) {
    gsSetStatus('Sin conexión', 'var(--red)');
  }
}

function gsSetStatus(msg, color) {
  const el = document.getElementById('gs-status');
  if (el) { el.textContent = msg; el.style.color = color; }
}

function gsStartPull() {
  if (gsSyncInterval) clearInterval(gsSyncInterval);
  if (!gsUrl) return;
  gsSyncInterval = setInterval(gsPull, 60000);
  gsPull(); // primer pull inmediato
}

async function exportarCatalogoJPG() {
  toast('Generando imagen...', '');
  const el = document.getElementById('cat-print-content');
  if(!el) { toast('Abrí la vista previa primero', 'err'); return; }
  try {
    const { default: html2canvas } = await import('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.esm.min.js');
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    const link = document.createElement('a');
    link.download = `catalogo-${businessName.toLowerCase().replace(/\s+/g,'-')}-${new Date().toISOString().split('T')[0]}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    toast('JPG descargado ✓', 'ok');
  } catch(e) {
    toast('Usá Imprimir → Guardar como PDF', 'err');
  }
}

function calcMayDiff(prodId, newMayPrice) {
  const p = catalog.find(x => x.id === prodId);
  if (!p || !p.price || !newMayPrice) return '—';
  const diff = Math.round(((newMayPrice - p.price) / p.price) * 100);
  return (diff > 0 ? '+' : '') + diff + '%';
}

// ── AUTO-BACKUP DIARIO ──────────────────────────────────────────────────────
const AUTO_BACKUP_KEY  = 'pp2_autobackup_data';
const AUTO_BACKUP_DATE = 'pp2_autobackup_date';
const AUTO_BACKUP_WARN = 7; // días sin backup manual antes de avisar

function autoBackup() {
  const today = new Date().toISOString().split('T')[0];
  const lastDate = localStorage.getItem(AUTO_BACKUP_DATE) || '';
  if (lastDate === today) return; // ya se hizo hoy

  const data = { CATS, UNITS, catalog, provs, history, audit, rutina,
    templateTasks, diasAlertaVenc, clients, cashDiscountPct,
    businessName, businessTag, businessLogo, lotes,
    _autoBackupDate: today };
  try {
    localStorage.setItem(AUTO_BACKUP_KEY, JSON.stringify(data));
    localStorage.setItem(AUTO_BACKUP_DATE, today);
  } catch(e) {
    // localStorage lleno: no bloquear
  }
}

function checkBackupAlert() {
  // Muestra aviso si el último backup MANUAL tiene más de AUTO_BACKUP_WARN días
  const lastManual = localStorage.getItem('pp2_last_manual_backup');
  if (!lastManual) return; // nunca hizo uno, no avisar todavía
  const dias = Math.floor((Date.now() - new Date(lastManual)) / 86400000);
  if (dias >= AUTO_BACKUP_WARN) {
    // Banner no intrusivo al pie del header (solo una vez por sesión)
    if (sessionStorage.getItem('pp2_backup_warned')) return;
    sessionStorage.setItem('pp2_backup_warned', '1');
    setTimeout(() => {
      toast(`⚠️ Hace ${dias} días sin exportar respaldo manual`, 'err', 7000);
    }, 2000);
  }
}

function restoreAutoBackup() {
  const raw = localStorage.getItem(AUTO_BACKUP_KEY);
  const date = localStorage.getItem(AUTO_BACKUP_DATE) || '—';
  if (!raw) { toast('No hay auto-respaldo guardado', 'err'); return; }
  modal('Restaurar Auto-Respaldo',
    `<p style="font-size:13px;color:var(--t2);margin-bottom:12px;">
       Se restaurará el respaldo automático del <strong>${date}</strong>.<br>
       Los cambios posteriores a esa fecha se perderán.
     </p>
     <p style="font-size:12px;color:var(--amber);">⚠️ Se recomienda exportar los datos actuales primero.</p>`,
    `<button class="btn btn-danger" onclick="doRestoreAutoBackup()">Restaurar igual</button>
     <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>`);
}

function doRestoreAutoBackup() {
  const raw = localStorage.getItem(AUTO_BACKUP_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    CATS = data.CATS || SEED_CATS.map(x=>({...x}));
    UNITS = data.UNITS || [...SEED_UNITS];
    catalog = data.catalog; provs = data.provs;
    history = data.history || []; audit = data.audit || [];
    rutina = data.rutina || { fecha: '', tareas: [] };
    templateTasks = data.templateTasks || SEED_TASKS.map(x=>({...x}));
    clients = data.clients || [];
    if (data.lotes) lotes = data.lotes;
    if (data.diasAlertaVenc !== undefined) diasAlertaVenc = data.diasAlertaVenc;
    if (data.cashDiscountPct !== undefined) cashDiscountPct = data.cashDiscountPct;
    if (data.businessName !== undefined) businessName = data.businessName;
    if (data.businessTag  !== undefined) businessTag  = data.businessTag;
    if (data.businessLogo !== undefined) businessLogo = data.businessLogo;
    persist(); restore(); updateBranding();
    closeModal(); toast('Auto-respaldo restaurado ✓', 'ok');
    renderAdmin();
  } catch(e) { toast('Error al restaurar', 'err'); }
}

function exportData() {
  const data = { CATS, UNITS, catalog, provs, history, audit, rutina,
    templateTasks, diasAlertaVenc, clients, cashDiscountPct,
    businessName, businessTag, businessLogo, lotes};
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

async function startCamera() {
  try {
    const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };
    scannerStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('scanner-video');
    if (!video) { stopCamera(); return; }
    video.srcObject = scannerStream;
    await video.play();

    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','qr_code','code_128','code_39','upc_a','upc_e','itf','data_matrix','aztec'] });
      scannerInterval = setInterval(async () => {
        if (!document.getElementById('scanner-video')) { clearInterval(scannerInterval); return; }
        try {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) { clearInterval(scannerInterval); handleScanResult(barcodes[0].rawValue); }
        } catch(_) {}
      }, 350);
    } else {
      // Fallback ZXing para navegadores sin BarcodeDetector
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
      script.onload = () => {
        if (!document.getElementById('scanner-video')) return;
        try {
          const reader = new ZXing.BrowserMultiFormatReader();
          reader.decodeFromVideoElement(video).then(r => { if (r) handleScanResult(r.getText()); }).catch(()=>{});
          window._zxingReader = reader;
        } catch(_) {}
      };
      document.head.appendChild(script);
      const el = document.getElementById('scan-result');
      if (el) el.innerHTML = `<div style="font-size:11px;color:var(--t3);text-align:center;">Cámara activa · cargando detector...</div>`;
    }
  } catch(err) {
    const el = document.getElementById('scan-result');
    if (el) {
      const msg = err.name === 'NotAllowedError'
        ? '⚠️ Sin permiso de cámara. Habilitalo en tu navegador.'
        : '⚠️ No se pudo acceder a la cámara. Usá Chrome en Android o Safari en iOS.';
      el.innerHTML = `<div style="font-size:12px;color:var(--red);text-align:center;padding:8px;">${msg}</div>`;
    }
  }
}

  if (scannerInterval) { clearInterval(scannerInterval); scannerInterval = null; }
  if (scannerStream)   { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }

function addProductWithCode() {
  const name    = (document.getElementById('np_name').value||'').trim();
  const loc     = (document.getElementById('np_loc').value||'').trim() || 'Principal';
  const cat     =  document.getElementById('np_cat').value;
  const prov    =  document.getElementById('np_prov').value;
  const unit    = (document.getElementById('np_unit').value||'kg').trim();
  const min     =  parseInt(document.getElementById('np_min').value) || 0;
  const price   =  parseFloat(document.getElementById('np_price').value) || 0;
  const barcode = (document.getElementById('np_barcode').value||'').trim();
  if (!name || !cat || !prov || !unit) { toast('Nombre, Categoría, Unidad y Proveedor son obligatorios','err'); return; }
  catalog.unshift({ id: Date.now(), name, cat, unit, min, price, prov, locs: [{name: loc, qty: 0}], stock: 0, venc: '', hidden: false, barcode });
  log('Producto (código)', `Añadido: ${name} · ${barcode}`);
  persist(); closeModal(); toast('Producto agregado ✓','ok');
  if (currentPage === 'admin') renderAdmin();
  if (currentPage === 'stock') renderStock();
}

function getStockRows() {
  const q = (document.getElementById('sq')?.value || '').toLowerCase().trim();
  return catalog.filter(p => {
    if (p.hidden) return false;
    if (activeStockFilter === 'low')  return isCritical(p);
    if (activeStockFilter === 'venc') return checkVenc(p.venc) > 0;
    if (q) return p.name.toLowerCase().includes(q) || provName(p.prov).toLowerCase().includes(q);
    return true;
  });
}

/* ── EXPORTAR POR CATEGORÍA: EXCEL ── */
function exportCatExcel() {
  const selectedIds = getSelectedCats();
  if (!selectedIds.length) { toast('Seleccioná al menos una categoría', 'err'); return; }
  closeModal();

  const today = new Date().toLocaleDateString('es-AR');
  const wb = XLSX.utils.book_new();

  selectedIds.forEach(catId => {
    const cat = CATS.find(c => c.id === catId);
    if (!cat) return;
    const rows = catalog.filter(p => !p.hidden && p.cat === catId);
    if (!rows.length) return;

    const sheetName = cat.name.substring(0, 31); // Excel max 31 chars
    const data = [
      [`${businessName} — ${cat.name}`, '', '', '', '', '', ''],
      [`Fecha: ${today}  ·  ${rows.length} productos`, '', '', '', '', '', ''],
      [''],
      ['Producto', 'Stock', 'Unidad', 'Mínimo', 'Vencimiento', 'Proveedor', 'Precio $', 'Estado'],
      ...rows.map(p => {
        const stock = p.stock ?? p.locs?.reduce((a,l)=>a+(l.qty||0),0) ?? 0;
        const v = checkVenc(p.venc);
        const estado = isCritical(p) ? 'STOCK BAJO' : v===2 ? 'VENCIDO' : v===1 ? 'POR VENCER' : 'OK';
        return [
          p.name, stock, p.unit||'', p.min||0,
          p.venc ? new Date(p.venc).toLocaleDateString('es-AR') : '',
          provName(p.prov), p.price||0, estado
        ];
      })
    ];

    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:32},{wch:10},{wch:8},{wch:8},{wch:14},{wch:18},{wch:10},{wch:12}];
    ws['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:7} }, { s:{r:1,c:0}, e:{r:1,c:7} }];
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  const fname = `stock_categorias_${today.replace(/\//g,'-')}.xlsx`;
  XLSX.writeFile(wb, fname);
  toast(`Excel con ${selectedIds.length} categorías exportado ✓`, 'ok');
}

/* ── EXPORTAR POR CATEGORÍA: PDF ── */
function exportCatPDF() {
  const selectedIds = getSelectedCats();
  if (!selectedIds.length) { toast('Seleccioná al menos una categoría', 'err'); return; }
  closeModal();
  toast('Generando PDF...', 'ok');

  setTimeout(async () => {
    try {
      const today = new Date().toLocaleDateString('es-AR');
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pw  = doc.internal.pageSize.getWidth();   // 210
      const ph  = doc.internal.pageSize.getHeight();  // 297
      const mg  = 10;
      const isDark = appTheme !== 'light';
      const bgC  = isDark ? [17,18,20]   : [255,255,255];
      const txtC = isDark ? [210,210,210] : [30,30,30];
      const txt3 = isDark ? [100,110,125] : [140,145,155];
      const rowA = isDark ? [22,24,28]    : [248,250,252];  // fila par
      const acMap = {
        dark:[74,222,128], light:[13,126,74], navy:[123,158,240],
        ocean:[56,189,248], forest:[52,211,153], sunset:[251,146,60],
        arctic:[14,165,233], sakura:[244,114,182],
        violeta:[167,139,250], vino:[251,113,133], carbon:[34,211,238], dorado:[251,191,36]
      };
      const ac = acMap[appTheme] || [74,222,128];

      // Anchos de columna (total = pw - mg*2 = 190mm)
      // Producto(80) Stock(18) Unidad(16) Precio(20) Vto(26) Estado(24) = 184 + 6 padding
      const COL = { prod:78, stock:18, unit:16, precio:22, vto:28, estado:22 };
      const ROW_H  = 6.5;  // altura de fila
      const HEAD_H = 7;    // altura cabecera tabla
      const CAT_H  = 9;    // altura bloque título categoría
      const FOOTER = 10;   // espacio reservado footer

      // ── Helpers ──────────────────────────────────────
      function fitText(str, maxW, fontSize) {
        doc.setFontSize(fontSize);
        while (str.length > 3 && doc.getTextWidth(str) > maxW) {
          str = str.slice(0, -1);
        }
        return str.length < str.length ? str + '…' : str;
      }

      function truncate(str, maxW) {
        if (!str) return '—';
        let s = String(str);
        while (s.length > 1 && doc.getTextWidth(s + '…') > maxW) s = s.slice(0,-1);
        return doc.getTextWidth(String(str)) > maxW ? s + '…' : String(str);
      }

      function newPage() {
        doc.addPage();
        doc.setFillColor(...bgC);
        doc.rect(0, 0, pw, ph, 'F');
        return mg + 4; // y inicial en página nueva
      }

      // ── Página 1: fondo + header principal ───────────
      doc.setFillColor(...bgC);
      doc.rect(0, 0, pw, ph, 'F');

      doc.setFillColor(...ac);
      doc.rect(0, 0, pw, 14, 'F');
      doc.setFontSize(11); doc.setFont('helvetica', 'bold');
      doc.setTextColor(isDark?10:255, isDark?10:255, isDark?10:255);
      doc.text(`${businessName} — Stock por Categoría`, mg, 9);
      doc.setFontSize(7.5); doc.setFont('helvetica', 'normal');
      doc.text(today, pw - mg, 9, { align: 'right' });

      let y = 20;

      // ── Por cada categoría ────────────────────────────
      selectedIds.forEach((catId) => {
        const cat  = CATS.find(c => c.id === catId);
        if (!cat) return;
        const rows = catalog.filter(p => !p.hidden && p.cat === catId);
        if (!rows.length) return;

        // Calcular espacio que necesita esta categoría para decidir si hay lugar
        const needed = CAT_H + HEAD_H + Math.min(rows.length, 3) * ROW_H;
        if (y + needed > ph - FOOTER) y = newPage();

        // ── Encabezado de categoría ──
        const acLight = ac.map(v => Math.min(255, v + 40));
        doc.setFillColor(...(isDark ? acLight : ac));
        doc.roundedRect(mg, y, pw - mg * 2, CAT_H - 1, 2, 2, 'F');
        doc.setFontSize(9); doc.setFont('helvetica', 'bold');
        doc.setTextColor(isDark ? 10 : 255, isDark ? 10 : 255, isDark ? 10 : 255);
        doc.text(cat.name, mg + 3, y + 5.8);
        doc.setFontSize(7); doc.setFont('helvetica', 'normal');
        doc.text(`${rows.length} prod.`, pw - mg - 2, y + 5.8, { align: 'right' });
        y += CAT_H;

        // ── Cabecera de tabla ──
        doc.setFillColor(...(isDark ? [28,31,37] : [232,236,242]));
        doc.rect(mg, y, pw - mg * 2, HEAD_H, 'F');
        doc.setFontSize(6.5); doc.setFont('helvetica', 'bold');
        doc.setTextColor(...txt3);
        let x = mg + 2;
        doc.text('PRODUCTO',  x, y + 4.8); x += COL.prod;
        doc.text('STOCK',     x, y + 4.8); x += COL.stock;
        doc.text('UD.',       x, y + 4.8); x += COL.unit;
        doc.text('PRECIO',    x, y + 4.8); x += COL.precio;
        doc.text('VENCE',     x, y + 4.8); x += COL.vto;
        doc.text('ESTADO',    x, y + 4.8);
        y += HEAD_H;

        // ── Filas de producto ──
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5);

        rows.forEach((p, idx) => {
          // ¿Cabe la fila? Si no, nueva página con mini-header
          if (y + ROW_H > ph - FOOTER) {
            y = newPage();
            // Mini-header de continuación
            doc.setFillColor(...(isDark ? acLight : ac));
            doc.roundedRect(mg, y, pw - mg * 2, 6, 1, 1, 'F');
            doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
            doc.setTextColor(isDark?10:255, isDark?10:255, isDark?10:255);
            doc.text(`${cat.name} (cont.)`, mg + 3, y + 4.2);
            doc.setFont('helvetica', 'normal');
            y += 8;
          }

          const stock = p.stock ?? p.locs?.reduce((a,l)=>a+(l.qty||0),0) ?? 0;
          const v     = checkVenc(p.venc);
          const bajo  = isCritical(p);
          const eC    = bajo||v===2 ? [239,68,68] : v===1 ? [245,158,11] : ac;
          const eL    = bajo ? 'BAJO' : v===2 ? 'VENCIDO' : v===1 ? 'X VENCER' : 'OK';
          const vtoS  = p.venc ? new Date(p.venc).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';

          // Fondo alterno
          if (idx % 2 === 0) {
            doc.setFillColor(...rowA);
            doc.rect(mg, y - ROW_H + 1.5, pw - mg * 2, ROW_H, 'F');
          }

          doc.setTextColor(...txtC);
          x = mg + 2;

          // Nombre con truncado inteligente
          doc.setFontSize(7.5); doc.setFont('helvetica', 'bold');
          doc.text(truncate(p.name, COL.prod - 3), x, y); x += COL.prod;

          doc.setFont('helvetica', 'normal');
          doc.text(String(stock),            x, y); x += COL.stock;
          doc.text(p.unit || '—',            x, y); x += COL.unit;
          doc.text(p.price ? `$${p.price}` : '—', x, y); x += COL.precio;
          doc.text(vtoS,                     x, y); x += COL.vto;

          // Estado con color
          doc.setTextColor(...eC);
          doc.setFont('helvetica', 'bold');
          doc.text(eL, x, y);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(...txtC);

          y += ROW_H;
        });

        y += 6; // separación entre categorías
      });

      // ── Footer en todas las páginas ───────────────────
      const tp = doc.internal.getNumberOfPages();
      for (let i = 1; i <= tp; i++) {
        doc.setPage(i);
        doc.setFontSize(6); doc.setTextColor(...txt3);
        doc.text(
          `${businessName} Pro  ·  ${new Date().toLocaleString('es-AR')}  ·  Pág ${i} / ${tp}`,
          pw / 2, ph - 4, { align: 'center' }
        );
      }

      doc.save(`stock_categorias_${today.replace(/\//g,'-')}.pdf`);
      toast('PDF exportado ✓', 'ok');
    } catch(e) { toast('Error al generar PDF', 'err'); console.error(e); }
  }, 200);
}

function sendWAAlert(type) {
  const phone = (document.getElementById('wa-phone')?.value || waAlertPhone || '').replace(/[^0-9+]/g,'');
  if (!phone) { toast('Ingresá el número de WhatsApp primero', 'err'); return; }

  const today = new Date().toLocaleDateString('es-AR');
  let msg = `*${businessName}* — Alerta de Stock\n_${today}_\n\n`;

  if (type === 'low' || type === 'all') {
    const prods = catalog.filter(p => !p.hidden && isCritical(p));
    if (prods.length) {
      msg += `⚠️ *STOCK BAJO (${prods.length} productos)*\n`;
      prods.forEach(p => { msg += `• ${p.name}: *${p.stock} ${p.unit}* (mín: ${p.min})\n`; });
      msg += '\n';
    }
  }

  if (type === 'venc' || type === 'all') {
    const prods = catalog.filter(p => !p.hidden && checkVenc(p.venc) > 0);
    if (prods.length) {
      msg += `📅 *VENCIMIENTOS (${prods.length} productos)*\n`;
      prods.forEach(p => {
        const v = checkVenc(p.venc);
        msg += `• ${p.name}: ${v===2?'✗ VENCIDO':'⚠ '+formatVenc(p.venc)}\n`;
      });
    }
  }

  if (type === 'all' && !msg.includes('STOCK') && !msg.includes('VENC')) {
    msg += '✅ Sin alertas. Todo en orden.';
  }

  const url = `https://wa.me/${phone.replace('+','')}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  log('WhatsApp', `Alerta enviada: ${type}`);
  toast('Abriendo WhatsApp...', 'ok');
}

function openMarginCalc() {
  const prods = catalog.filter(p => !p.hidden && p.price > 0);
  const withCost = prods.filter(p => p.cost > 0);

  // Totales
  const totalStock  = withCost.reduce((a,p) => a + (p.stock||0) * (p.cost||0), 0);
  const totalSales  = withCost.reduce((a,p) => a + (p.stock||0) * (p.price||0), 0);
  const totalProfit = totalSales - totalStock;
  const avgMargin   = withCost.length ? withCost.reduce((a,p)=>{
    return a + (p.cost>0 ? ((p.price-p.cost)/p.cost*100) : 0);
  }, 0) / withCost.length : 0;

  modal('Márgenes y Ganancias', `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
      <div style="background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Valor en stock (costo)</div>
        <div style="font-size:16px;font-weight:800;color:var(--t1);">$${totalStock.toLocaleString('es-AR',{minimumFractionDigits:0})}</div>
      </div>
      <div style="background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Valor en stock (venta)</div>
        <div style="font-size:16px;font-weight:800;color:var(--accent);">$${totalSales.toLocaleString('es-AR',{minimumFractionDigits:0})}</div>
      </div>
      <div style="background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Ganancia potencial</div>
        <div style="font-size:16px;font-weight:800;color:var(--accent);">$${totalProfit.toLocaleString('es-AR',{minimumFractionDigits:0})}</div>
      </div>
      <div style="background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Margen promedio</div>
        <div style="font-size:16px;font-weight:800;color:${avgMargin>=30?'var(--accent)':avgMargin>=15?'var(--amber)':'var(--red)'};">${avgMargin.toFixed(1)}%</div>
      </div>
    </div>

    <!-- Tabla de productos con margen -->
    <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">
      Productos — costo vs precio de venta
    </div>
    <div style="max-height:260px;overflow-y:auto;">
      ${prods.length === 0
        ? '<div style="text-align:center;color:var(--t3);padding:20px;font-size:12px;">Sin productos con precio de venta cargado</div>'
        : prods.sort((a,b) => {
            const mA = a.cost>0?(a.price-a.cost)/a.cost*100:0;
            const mB = b.cost>0?(b.price-b.cost)/b.cost*100:0;
            return mB - mA;
          }).map(p => {
            const margin = p.cost > 0 ? ((p.price - p.cost) / p.cost * 100) : null;
            const mColor = margin === null ? 'var(--t3)' : margin >= 30 ? 'var(--accent)' : margin >= 15 ? 'var(--amber)' : 'var(--red)';
            const barW   = margin !== null ? Math.min(100, Math.max(0, margin)) : 0;
            return `
            <div style="padding:9px 0;border-bottom:1px solid var(--line);">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                <div style="font-size:12px;font-weight:600;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div>
                <div style="display:flex;gap:10px;flex-shrink:0;margin-left:8px;">
                  ${p.cost > 0 ? `<span style="font-size:11px;color:var(--t3);">Costo: $${p.cost}</span>` : `<button class="btn btn-ghost btn-sm" style="font-size:10px;padding:2px 8px;height:auto;" onclick="editCostInline(${p.id},this)">+ Costo</button>`}
                  <span style="font-size:11px;color:var(--t2);">Venta: $${p.price}</span>
                  <span style="font-size:12px;font-weight:700;color:${mColor};min-width:44px;text-align:right;">${margin!==null?margin.toFixed(1)+'%':'—'}</span>
                </div>
              </div>
              ${margin !== null ? `<div style="height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;">
                <div style="height:100%;width:${barW}%;background:${mColor};border-radius:2px;transition:width .4s;"></div>
              </div>` : ''}
            </div>`;
          }).join('')
      }
    </div>
    ${withCost.length < prods.length ? `<div style="font-size:10px;color:var(--t3);text-align:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);">
      ${prods.length - withCost.length} productos sin precio de costo — editá el producto para agregarlo
    </div>` : ''}
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>`);
}

function editCostInline(id, btn) {
  const cost = parseFloat(prompt('Precio de costo para este producto:'));
  if (isNaN(cost) || cost < 0) return;
  const p = catalog.find(x => x.id === id);
  if (p) { p.cost = cost; persist(); closeModal(); openMarginCalc(); toast('Costo guardado ✓','ok'); }
}

/* ══ pwa.js ══ */
/* ── PWA ── */
(function setupPWA() {
  const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#18191d"/><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-size="280" fill="#4ade80">🐟</text></svg>`;
  const iconUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgIcon)));
  const manifest = { name: "Pescadería Pro", short_name: "Pescadería", display: "standalone", start_url: location.href, background_color: "#111214", theme_color: "#111214", icons: [{ src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }] };
  document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}))}"><meta name="theme-color" content="#111214"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="apple-touch-icon" href="${iconUrl}">`);
})();
</script>
</body>
